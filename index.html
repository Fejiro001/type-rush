<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Team 2" />
    <meta name="description" content="TypeRush is a fast-paced typing game that challenges players to improve their speed and accuracy." />
    <meta name="keywords" content="typing, game, speed, accuracy" />
    <link rel="icon" href="./assets/media/favicon.png?v=2" type="image/x-icon" />
    <title>TypeRush</title>
    <link rel="stylesheet" href="./assets/styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="./assets/script/app.js" defer></script>
  </head>
  <body>
    <audio id="bg-music" loop>
        <source src="./assets/media/audio2.mp3" type="audio/mpeg">
    </audio>
    <main id="app-container">
      <div id="start-screen" class="screen">
        <h1 class="pixel" style="font-size: 3rem;">
          <span class="pink">TYPE</span><span class="cyan">RUSH</span>
        </h1>
        <p class="pixel" style="color:var(--yellow); font-size:0.7rem; margin: 20px 0;">HOW FAST CAN YOU TYPE?</p>
        <div style="display: flex; justify-content: center; gap: 10px;">
          <div class="card"><h2 class="cyan pixel">99</h2><p style="font-size:0.5rem">SECONDS</p></div>
          <div class="card"><h2 class="cyan pixel">90</h2><p style="font-size:0.5rem">WORDS</p></div>
        </div>
        <br>
        <button class="btn-yellow" id="start-btn">▶ START GAME</button>
      </div>
      <div id="game-screen" class="screen" style="display: none;">
        <div style="display:flex; justify-content:space-around; width: 100%; margin-bottom:40px;" class="pixel">
          <p>TIME: <span id="time-left" class="cyan">99s</span></p>
          <p>POINTS: <span id="score-display" class="pink">0</span></p>
        </div>
        <h1 id="word-display" style="font-size: 3.5rem; margin-bottom: 20px;" class="pixel">READY?</h1>
        <input type="text" id="game-input" autocomplete="off" autofocus
               style="background:transparent; border:2px solid var(--pink); color:white; padding:15px; font-size:2rem; text-align:center; width:60%; outline: none;">
      </div>
      <div id="end-screen" class="screen" style="display: none;">
        <h1 class="pixel pink" style="font-size: 3rem;">GAME OVER</h1>
        <div class="card" style="width: 300px; margin: 0 auto;">
          <p class="pixel" style="font-size: 0.8rem;">FINAL SCORE</p>
          <h2 id="final-score-display" class="cyan pixel">0</h2>
        </div>
        <br>
        <button class="btn-yellow" onclick="location.reload()">↻ PLAY AGAIN</button>
      </div>
    </main>
  </body>
</html>
