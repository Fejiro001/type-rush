<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Team 2" />
    <meta name="description" content="TypeRush is a fast-paced typing game that challenges players to improve their speed and accuracy." />
    <meta name="keywords" content="typing, game, speed, accuracy" />
    <link rel="icon" href="./assets/media/favicon.png?v=2" type="image/x-icon" />
    <title>TypeRush</title>
    <link rel="stylesheet" href="./assets/styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="./assets/script/app.js" defer type="module"></script>
  </head>
  <body>
    <main>
      <section class="game-section">
        <div id="start-screen" class="screen active container game-container">
          <h1 class="main-title"><span class="pink">Type</span><span class="cyan">rush</span></h1>
          <p class="subtitle">How fast can you type?</p>
          <ul class="card-group">
            <li class="card">
              <h2 class="cyan">99</h2>
              <p class="card-label">SECONDS</p>
            </li>
            <li class="card">
              <h2 class="cyan">90</h2>
              <p class="card-label">WORDS</p>
            </li>
          </ul>
          <div class="button-group">
            <button class="btn-yellow" id="start-btn"><i class="fa-solid fa-play"></i>Start game</button>
            <button class="btn-outline-yellow" id="scoreboard-btn"><i class="fa-solid fa-gamepad"></i>Scoreboard</button>
          </div>
          <div class="instruction-text">
            <span class="arrows">▶</span>
            <p>Press play to start</p>
            <span class="arrows">◀</span>
          </div>
        </div>
        <div id="typing-screen" class="screen container typing-container">
          <ul class="typing-stats">
            <li class="time">
              <p class="time-label">Time</p>
              <p class="time-value"></p>
            </li>
            <li class="points">
              <p class="points-label">Points</p>
              <p class="points-value">0</p>
            </li>
            <li class="word">
              <p class="word-label">Word</p>
              <p class="word-value"><span class="current-word"></span>/<span class="total-words"></span></p>
            </li>
          </ul>
          <div class="word-display">
            <p class="displayed-word"></p>
          </div>
          <form class="word-form">
            <input class="word-input" type="text" placeholder="Start typing..." autofocus />
          </form>
        </div>
        <div id="end-screen" class="screen container game-container">
          <h1 class="pink main-title">Game<span class="cyan">over</span></h1>
          <p class="subtitle">Try again</p>
          <div class="high-score-box">
            <div class="high-score-text">
              <span class="arrows">▶</span>
              <p>Your score</p>
              <span class="arrows">◀</span>
            </div>
            <ul class="game-stats">
              <li class="stat-row">
                <span class="stat-label">Points</span>
                <span class="stat-value"></span>
              </li>
              <li class="stat-row">
                <span class="label">Accuracy</span>
                <span class="stat-value"></span>
              </li>
              <li class="stat-row">
                <span class="stat-label">Avg. time per word</span>
                <span class="stat-value"></span>
              </li>
            </ul>
          </div>
          <div class="button-group">
            <button class="btn-yellow"><i class="fa-solid fa-arrows-rotate"></i>Play again</button>
            <button class="btn-outline-yellow" id="scoreboard-btn-end"><i class="fa-solid fa-gamepad"></i>Scoreboard</button>
          </div>
        </div>
        <div id="scoreboard-screen" class="screen container typing-container">
          <h1 class="main-title pink">Score<span class="cyan">board</span></h1>
          <p class="page-description">Your current scores</p>
          <table class="score-table">
            <thead>
              <tr>
                <th>S/N</th>
                <th>Points</th>
                <th>Accuracy</th>
                <th>Date Played</th>
              </tr>
            </thead>
            <tbody class="score-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
