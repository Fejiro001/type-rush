<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Team 2" />
    <meta name="description" content="TypeRush is a fast-paced typing game that challenges players to improve their speed and accuracy." />
    <meta name="keywords" content="typing, game, speed, accuracy" />
    <link rel="icon" href="./assets/media/favicon.png?v=2" type="image/x-icon" />
    <title>TypeRush</title>
    <link rel="stylesheet" href="./assets/styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="./assets/script/app.js" defer></script>
  </head>
  <body>
    <main>
      <section id="start-screen" class="game-section screen active">
        <div class="container start-container">
          <h1 class="pixel main-title"><span class="pink">TYPE</span><span class="cyan">RUSH</span></h1>
          <p class="pixel subtitle">How fast can you type?</p>
          <ul class="card-group">
            <li class="card">
              <h2 class="cyan pixel">99</h2>
              <p class="card-label">SECONDS</p>
            </li>
            <li class="card">
              <h2 class="cyan pixel">90</h2>
              <p class="card-label">WORDS</p>
            </li>
          </ul>
          <div class="button-group">
            <button class="btn-yellow" id="start-btn"><i class="fa-solid fa-play"></i>Start game</button>
            <button class="btn-outline-yellow" id="scoreboard-btn-start"><i class="fa-solid fa-gamepad"></i>Scoreboard</button>
          </div>
          <p class="pixel footer-text">
            <i class="fa-solid fa-caret-right"></i> Press play to start
            <i class="fa-solid fa-caret-left"></i>
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
