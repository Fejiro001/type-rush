<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Team 2" />
    <meta name="description" content="TypeRush is a fast-paced typing game that challenges players to improve their speed and accuracy." />
    <meta name="keywords" content="typing, game, speed, accuracy" />
    <link rel="icon" href="./assets/media/favicon.png?v=2" type="image/x-icon" />
    <title>TypeRush</title>
    <link rel="stylesheet" href="./assets/styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="./assets/script/app.js" defer></script>
  </head>
  <body>
      <main id="app-container">
        <div id="start-screen" class="screen active">
            <h1 class="pixel main-title">
                <span class="pink">TYPE</span><span class="cyan">RUSH</span>
            </h1>
            <p class="pixel subtitle">HOW FAST CAN YOU TYPE?</p>
             <div class="card-group">
                <div class="card">
                    <h2 class="cyan pixel">99</h2>
                    <p class="card-label">SECONDS</p>
                </div>
                <div class="card">
                    <h2 class="cyan pixel">90</h2>
                    <p class="card-label">WORDS</p>
                </div>
            </div>
             <div class="button-group">
                <button class="btn-yellow" id="start-btn">▶ START GAME</button>
                <button class="btn-outline-yellow" id="scoreboard-btn-start">
                    <span class="grid-icon">▤▤</span> SCOREBOARD
                </button>
        </div>
            <div class="footer-container">
            <p class="pixel footer-text">
                <span class="arrow-left">▶</span> 
                PRESS PLAY START 
                <span class="arrow-right">◀</span>
            </p>
      </div>
   </body>
 </html>
