<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Team 2" />
    <meta name="description" content="TypeRush is a fast-paced typing game that challenges players to improve their speed and accuracy." />
    <meta name="keywords" content="typing, game, speed, accuracy" />
    <link rel="icon" href="./assets/media/favicon.png?v=2" type="image/x-icon" />
    <title>TypeRush</title>
    <link rel="stylesheet" href="./assets/styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="./assets/script/app.js" defer></script>
  </head>
  <body class="grid-bg">
    <main>
      <section id="end-screen" class="game-section screen active">
        <div class="container start-container">
          <h1 class="pink main-title">Game<span class="cyan">over</span></h1>
          <p class="subtitle">Try again</p>
          <div class="high-score-box">
            <div class="high-score-text">
              <span class="arrows">▶</span>
              <p>HIGH SCORE</p>
              <span class="arrows">◀</span>
            </div>
            <ul class="game-stats">
              <li class="stat-row">
                <span class="stat-label">Points</span>
                <span class="stat-value">25</span>
              </li>
              <li class="stat-row">
                <span class="label">Accuracy</span>
                <span class="stat-value">25%</span>
              </li>
              <li class="stat-row">
                <span class="stat-label">Avg. time per word</span>
                <span class="stat-value">1.8s</span>
              </li>
            </ul>
          </div>
          <div class="button-group">
            <button class="btn-yellow"><i class="fa-solid fa-arrows-rotate"></i>Play again</button>
            <button class="btn-outline-yellow" id="scoreboard-btn-end"><i class="fa-solid fa-gamepad"></i>Scoreboard</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
