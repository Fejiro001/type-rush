<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeRush - Game Over</title>
    <link rel="stylesheet" href="./assets/styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="grid-bg">
    <main id="app-container">
        <div id="end-screen" class="screen active">
            <h1 class="pixel pink main-title">GAME<br>OVER</h1>
            <p class="pixel subtitle-yellow">TRY AGAIN</p>
            
            <div class="high-score-box">
                <p class="pixel box-header">— HIGH SCORE —</p>
                
                <div class="stat-row">
                    <span class="label">POINTS</span>
                    <span class="cyan value">25</span>
                </div>
                
                <div class="stat-row">
                    <span class="label">ACCURACY</span>
                    <span class="cyan value">25%</span>
                </div>
                
                <div class="stat-row">
                    <span class="label">AVG. TIME PER WORD</span>
                    <span class="cyan value">1.8s</span>
                </div>
            </div>
            
            <button class="btn-yellow" onclick="window.location.href='index.html'">
                <span class="icon">↻</span> PLAY AGAIN
            </button>
             <button class="btn-outline-yellow" id="scoreboard-btn-end">
                 <span class="icon">▤▤</span> SCOREBOARD        
            </button>
        </div>
     </main>
</body>
