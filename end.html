<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TypeRush - Game Over</title>
    <link rel="stylesheet" href="./assets/styles/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  </head>
  <body class="grid-bg">
    <main>
      <section id="end-screen" class="game-section screen active">
        <div class="container start-container">
          <h1 class="pink main-title">Game<span class="cyan"> over</span></h1>
          <p class="subtitle">Try again</p>
          <div class="high-score-box">
            <div class="high-score-text">
              <span class="arrows">▶</span>
              <p>HIGH SCORE</p>
              <span class="arrows">◀</span>
            </div>
            <div class="stat-row">
              <span class="label">POINTS</span>
              <span class="cyan value">25</span>
            </div>
            <div class="stat-row">
              <span class="label">ACCURACY</span>
              <span class="cyan value">25%</span>
            </div>
            <div class="stat-row">
              <span class="label">AVG. TIME PER WORD</span>
              <span class="cyan value">1.8s</span>
            </div>
          </div>
          <div class="button-group">
            <button class="btn-yellow"><i class="fa-solid fa-arrows-rotate"></i>Play again</button>
            <button class="btn-outline-yellow" id="scoreboard-btn-end"><i class="fa-solid fa-trophy"></i>Scoreboard</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
